<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claim Status Update</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { padding: 20px; max-width: 600px; margin: 0 auto; }
        .header { background-color: #ffc107; color: #333; padding: 10px; text-align: center; }
        .content { padding: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Claim Status Update</h2>
        </div>
        <div class="content">
            <p>Dear {{FullName}},</p>
            <p>The status of your claim <strong>{{ClaimNumber}}</strong> has been updated to <strong>{{Status}}</strong>.</p>
            <p>If you have any questions, please contact our support team.</p>
            <p>Thank you for choosing SpeedClaim.</p>
        </div>
    </div>
</body>
</html>
