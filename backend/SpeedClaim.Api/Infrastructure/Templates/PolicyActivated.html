<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Policy Activated</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .container { padding: 20px; max-width: 600px; margin: 0 auto; }
        .header { background-color: #1e7e34; color: white; padding: 10px; text-align: center; }
        .content { padding: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Policy Activated</h2>
        </div>
        <div class="content">
            <p>Dear {{FullName}},</p>
            <p>Your payment of <strong>{{Amount}} INR</strong> was successful.</p>
            <p>Your policy <strong>{{PolicyNumber}}</strong> is now <strong>ACTIVE</strong>.</p>
            <p>Thank you for choosing SpeedClaim.</p>
        </div>
    </div>
</body>
</html>
