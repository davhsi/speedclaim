@if (doc(); as d) {
  <div class="fixed inset-0 z-[500] flex items-center justify-center p-4">
    <button type="button" [attr.aria-label]="'Close preview: ' + d.label" (click)="close()" class="absolute inset-0 bg-black/75 border-none cursor-default"></button>
    <dialog open class="relative bg-white rounded-card shadow-modal w-full max-w-3xl max-h-[92vh] flex flex-col p-0 border-0 m-0" [attr.aria-label]="'Preview: ' + d.label">
      <!-- Lightbox header -->
      <div class="flex items-center justify-between px-5 py-3 border-b border-line shrink-0 gap-3">
        <div class="flex items-center gap-2.5 min-w-0">
          <div class="w-7 h-7 rounded-lg bg-info-bg flex items-center justify-center shrink-0">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#2D7FF9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          </div>
          <span class="text-[13px] font-semibold text-ink truncate">{{ d.label }}</span>
        </div>
        <div class="flex items-center gap-2 shrink-0">
          <a [href]="d.url" target="_blank" rel="noopener"
            class="h-8 px-3 text-[12px] font-semibold text-body border border-line bg-white rounded-lg flex items-center gap-1.5 cursor-pointer hover:bg-surface transition-colors no-underline">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
            Open in new tab
          </a>
          <a [href]="d.url" target="_blank" download
            class="h-8 px-3 text-[12px] font-semibold text-body border border-line bg-white rounded-lg flex items-center gap-1.5 cursor-pointer hover:bg-surface transition-colors no-underline">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Download
          </a>
          <button (click)="close()" aria-label="Close preview" class="w-8 h-8 rounded-lg border border-line bg-white flex items-center justify-center cursor-pointer hover:bg-surface transition-colors">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      </div>

      <!-- Lightbox content -->
      <div class="flex-1 min-h-0 overflow-hidden bg-[#1A1A1A] rounded-b-card flex items-center justify-center">
        @if (isImage()) {
          <div class="overflow-auto w-full h-full flex items-center justify-center p-4" style="max-height: calc(92vh - 57px);">
            <img [src]="d.url" [alt]="d.label" class="max-w-full max-h-full object-contain rounded-lg shadow-lg" />
          </div>
        } @else if (isPdf()) {
          <iframe [src]="safePreviewUrl()" class="w-full border-0 rounded-b-card" style="height: calc(92vh - 57px);" [title]="d.label"></iframe>
        } @else {
          <div class="text-center py-16 px-8">
            <div class="w-14 h-14 rounded-2xl bg-white/10 flex items-center justify-center mx-auto mb-4">
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            </div>
            <p class="text-white/70 text-sm mb-4">This file type cannot be previewed in the browser.</p>
            <a [href]="d.url" target="_blank" download
              class="inline-flex items-center gap-2 h-10 px-5 bg-white text-ink text-[13px] font-semibold rounded-lg no-underline hover:bg-white/90 transition-opacity">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              Download file
            </a>
          </div>
        }
      </div>
    </dialog>
  </div>
}
