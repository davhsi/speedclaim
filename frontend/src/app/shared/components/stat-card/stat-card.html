<div class="bg-white rounded-card shadow-sm p-6 flex items-start gap-4 border border-line/50">
  <div class="w-12 h-12 rounded-control flex items-center justify-center shrink-0" [class]="iconBgClass()">
    <span class="text-xl" [innerHTML]="icon()"></span>
  </div>
  <div class="flex-1 min-w-0">
    <p class="text-sm text-muted font-medium">{{ title() }}</p>
    <p class="text-2xl font-bold text-ink mt-1 sc-numeric">{{ value() }}</p>
    @if (subtitle()) {
      <p class="text-xs text-muted mt-1">{{ subtitle() }}</p>
    }
  </div>
</div>
