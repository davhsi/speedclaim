@if (totalPages() > 1) {
  <div class="flex items-center justify-between px-1 py-3">
    <p class="text-sm text-muted">
      Page {{ currentPage() }} of {{ totalPages() }}
    </p>
    <div class="flex items-center gap-1">
      <button
        class="px-3 py-1.5 text-sm rounded-control border border-line hover:bg-surface-alt disabled:opacity-40 disabled:cursor-not-allowed transition-colors"
        [disabled]="currentPage() <= 1"
        (click)="pageChange.emit(currentPage() - 1)"
      >
        Previous
      </button>
      @for (page of visiblePages(); track page) {
        @if (page === -1) {
          <span class="px-2 text-muted">...</span>
        } @else {
          <button
            class="w-9 h-9 text-sm rounded-control transition-colors"
            [class]="page === currentPage() ? 'bg-primary text-white' : 'hover:bg-surface-alt text-body'"
            (click)="pageChange.emit(page)"
          >
            {{ page }}
          </button>
        }
      }
      <button
        class="px-3 py-1.5 text-sm rounded-control border border-line hover:bg-surface-alt disabled:opacity-40 disabled:cursor-not-allowed transition-colors"
        [disabled]="currentPage() >= totalPages()"
        (click)="pageChange.emit(currentPage() + 1)"
      >
        Next
      </button>
    </div>
  </div>
}
