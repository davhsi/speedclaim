@switch (variant()) {
  @case ('card') {
    <div class="bg-white rounded-card shadow-sm p-6 animate-pulse">
      <div class="flex items-start gap-4">
        <div class="w-12 h-12 rounded-control bg-gray-200"></div>
        <div class="flex-1">
          <div class="h-4 bg-gray-200 rounded w-1/3 mb-2"></div>
          <div class="h-6 bg-gray-200 rounded w-1/4"></div>
        </div>
      </div>
    </div>
  }
  @case ('list-card') {
    <div class="bg-white border border-line rounded-card mb-2.5 p-4 animate-pulse">
      <div class="h-2.5 bg-gray-200 rounded w-24 mb-2"></div>
      <div class="h-4 bg-gray-200 rounded w-40 mb-3"></div>
      <div class="h-2.5 bg-gray-200 rounded w-48"></div>
    </div>
  }
  @case ('table-row') {
    <div class="flex items-center gap-4 py-4 px-6 animate-pulse border-b border-line">
      <div class="h-4 bg-gray-200 rounded w-1/6"></div>
      <div class="h-4 bg-gray-200 rounded w-1/4"></div>
      <div class="h-4 bg-gray-200 rounded w-1/6"></div>
      <div class="h-4 bg-gray-200 rounded w-1/5"></div>
    </div>
  }
  @default {
    <div class="animate-pulse space-y-3">
      <div class="h-4 bg-gray-200 rounded w-3/4"></div>
      <div class="h-4 bg-gray-200 rounded w-1/2"></div>
      <div class="h-4 bg-gray-200 rounded w-5/6"></div>
    </div>
  }
}
