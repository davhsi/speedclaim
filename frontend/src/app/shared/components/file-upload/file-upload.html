<div class="space-y-2">
  @if (label()) {
    <label class="block text-sm font-medium text-ink">{{ label() }}</label>
  }
  @if (!selectedFile()) {
    <div
      class="border-2 border-dashed border-line rounded-card p-8 text-center cursor-pointer hover:border-primary hover:bg-primary-light/30 transition-colors"
      (click)="fileInput.click()"
      (dragover)="onDragOver($event)"
      (drop)="onDrop($event)"
    >
      <div class="text-muted">
        <svg class="mx-auto mb-2 w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
        </svg>
        <p class="text-sm font-medium">Drop file here or click to browse</p>
        @if (hint()) {
          <p class="text-xs mt-1">{{ hint() }}</p>
        }
      </div>
    </div>
  } @else {
    <div class="flex items-center gap-3 p-3 bg-surface-alt rounded-control border border-line">
      <svg class="w-5 h-5 text-primary shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
      </svg>
      <div class="flex-1 min-w-0">
        <p class="text-sm font-medium text-ink truncate">{{ selectedFile()!.name }}</p>
        <p class="text-xs text-muted">{{ formatSize(selectedFile()!.size) }}</p>
      </div>
      <button class="text-muted hover:text-danger transition-colors" (click)="removeFile()">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
  }
  @if (error()) {
    <p class="text-xs text-danger">{{ error() }}</p>
  }
  <input
    #fileInput
    type="file"
    class="hidden"
    [accept]="accept()"
    (change)="onFileSelected($event)"
  />
</div>
