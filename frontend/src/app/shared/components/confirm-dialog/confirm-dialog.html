<div class="fixed inset-0 z-400 flex items-center justify-center p-4" (click)="cancelled.emit()">
  <div class="absolute inset-0 bg-black/40"></div>
  <div class="relative bg-white rounded-modal shadow-modal max-w-md w-full p-6" (click)="$event.stopPropagation()">
    <h3 class="text-lg font-semibold text-ink mb-2">{{ title() }}</h3>
    <p class="text-sm text-body mb-6">{{ message() }}</p>
    <div class="flex justify-end gap-3">
      <button
        class="px-4 py-2 text-sm font-medium text-body bg-white border border-line rounded-control hover:bg-surface-alt transition-colors disabled:opacity-50 disabled:cursor-wait"
        [disabled]="disabled()"
        (click)="cancelled.emit()"
      >
        {{ cancelLabel() }}
      </button>
      <button
        class="px-4 py-2 text-sm font-medium text-white rounded-control transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
        [class]="variant() === 'danger' ? 'bg-danger hover:bg-red-700' : 'bg-primary hover:bg-primary-hover'"
        [disabled]="disabled()"
        (click)="confirmed.emit()"
      >
        {{ confirmLabel() }}
      </button>
    </div>
  </div>
</div>
