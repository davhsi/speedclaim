<div class="fixed bottom-[84px] lg:bottom-6 left-1/2 -translate-x-1/2 z-[500] flex flex-col gap-3">
  @for (toast of toastService.toasts(); track toast.id) {
    <div
      class="flex items-center gap-[9px] px-[18px] py-[11px] rounded-[10px] shadow-lg text-[13px] font-medium text-white animate-toast"
      style="background: var(--color-ink);"
      role="alert"
    >
      <span class="w-4 h-4 shrink-0 flex" [innerHTML]="toastIcon(toast.type) | safeHtml"></span>
      <span class="flex-1 whitespace-nowrap">{{ toast.message }}</span>
    </div>
  }
</div>
