@if (loading()) {
  <div class="text-center py-8">
    <svg class="animate-spin h-8 w-8 text-primary mx-auto mb-4" viewBox="0 0 24 24" fill="none">
      <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
      <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
    </svg>
    <p class="text-muted text-sm">Verifying your email...</p>
  </div>
} @else if (success()) {
  <div class="text-center py-4">
    <div class="mx-auto w-16 h-16 rounded-full bg-success-bg flex items-center justify-center mb-4">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#1F9D6B" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 6L9 17l-5-5"/>
      </svg>
    </div>
    <h2 class="text-2xl font-semibold text-ink mb-2">Email verified</h2>
    <p class="text-sm text-muted mb-6">Your email has been verified successfully. You can now sign in.</p>
    <a routerLink="/auth/login"
       class="inline-block h-11 leading-[44px] px-6 bg-primary text-white font-semibold text-[14px] rounded-control hover:bg-primary-hover transition-colors">
      Sign in
    </a>
  </div>
} @else {
  <div class="text-center py-4">
    <div class="mx-auto w-16 h-16 rounded-full bg-danger-bg flex items-center justify-center mb-4">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#D14343" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
      </svg>
    </div>
    <h2 class="text-2xl font-semibold text-ink mb-2">Verification failed</h2>
    <p class="text-sm text-muted mb-6">{{ errorMessage() }}</p>
    <a routerLink="/auth/login" class="text-primary font-semibold hover:text-primary-dark text-sm">Back to sign in</a>
  </div>
}
