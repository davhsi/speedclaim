<h2 class="text-2xl font-semibold text-ink mb-1">Forgot password?</h2>
<p class="text-sm text-muted mb-7">Enter your email and we'll send you a reset link.</p>

<form [formGroup]="form" (ngSubmit)="onSubmit()">
  <div class="mb-6">
    <label class="block text-[13px] font-medium text-body mb-1.5" for="email">Email address</label>
    <input id="email" type="email" formControlName="email" placeholder="you@example.com" autocomplete="email" class="h-11">
    @if (form.controls.email.touched && form.controls.email.errors) {
      <p class="text-xs text-danger mt-1">Please enter a valid email address.</p>
    }
  </div>

  <button
    type="submit"
    [disabled]="loading()"
    class="w-full h-11 bg-primary text-white font-semibold text-[14px] rounded-control hover:bg-primary-hover transition-colors disabled:opacity-60 disabled:cursor-not-allowed"
  >
    {{ loading() ? 'Sending...' : 'Send reset link' }}
  </button>
</form>

<p class="text-sm text-center text-muted mt-6">
  <a routerLink="/auth/login" class="text-primary font-semibold hover:text-primary-dark">Back to sign in</a>
</p>
