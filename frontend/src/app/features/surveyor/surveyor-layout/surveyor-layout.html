<div class="fixed inset-0 flex flex-col bg-surface">
  <router-outlet />

  <!-- Bottom Navigation -->
  @if (!isReportRoute()) {
    <nav class="shrink-0 bg-white border-t border-line flex z-10" style="height: calc(66px + env(safe-area-inset-bottom)); padding-bottom: env(safe-area-inset-bottom);">
      <a routerLink="/surveyor/claims"
         class="flex-1 flex flex-col items-center justify-center gap-0.5 pt-2 cursor-pointer no-underline"
         (click)="$event.stopPropagation()">
        <div class="w-8 h-7 rounded-lg flex items-center justify-center transition-colors"
             [class]="activeTab() === 'claims' ? 'bg-gold-light' : 'bg-transparent'">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none"
               [attr.stroke]="activeTab() === 'claims' ? '#C4801A' : '#6B7685'"
               stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/>
          </svg>
        </div>
        <span class="text-[10px]"
              [class]="activeTab() === 'claims' ? 'font-semibold text-gold-dark' : 'font-medium text-muted'">
          My claims
        </span>
      </a>
      <a routerLink="/surveyor/history"
         class="flex-1 flex flex-col items-center justify-center gap-0.5 pt-2 cursor-pointer no-underline"
         (click)="$event.stopPropagation()">
        <div class="w-8 h-7 rounded-lg flex items-center justify-center transition-colors"
             [class]="activeTab() === 'history' ? 'bg-gold-light' : 'bg-transparent'">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none"
               [attr.stroke]="activeTab() === 'history' ? '#C4801A' : '#6B7685'"
               stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
          </svg>
        </div>
        <span class="text-[10px]"
              [class]="activeTab() === 'history' ? 'font-semibold text-gold-dark' : 'font-medium text-muted'">
          History
        </span>
      </a>
      <a routerLink="/surveyor/profile"
         class="flex-1 flex flex-col items-center justify-center gap-0.5 pt-2 cursor-pointer no-underline"
         (click)="$event.stopPropagation()">
        <div class="w-8 h-7 rounded-lg flex items-center justify-center transition-colors"
             [class]="activeTab() === 'profile' ? 'bg-gold-light' : 'bg-transparent'">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none"
               [attr.stroke]="activeTab() === 'profile' ? '#C4801A' : '#6B7685'"
               stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
          </svg>
        </div>
        <span class="text-[10px]"
              [class]="activeTab() === 'profile' ? 'font-semibold text-gold-dark' : 'font-medium text-muted'">
          Profile
        </span>
      </a>
    </nav>
  }

  <!-- Notifications Panel -->
  @if (showNotifs()) {
    <div class="fixed inset-0 bg-black/45 z-[200] flex items-end" (click)="showNotifs.set(false)">
      <div class="bg-white rounded-t-[22px] w-full flex flex-col max-h-[72%] animate-slide-up"
           (click)="$event.stopPropagation()">
        <div class="flex justify-center pt-2.5 pb-1">
          <div class="w-9 h-1 rounded-full bg-line"></div>
        </div>
        <div class="flex items-center justify-between px-[18px] pb-3.5 border-b border-line">
          <div class="text-[17px] font-bold text-ink">Notifications</div>
          <button class="text-xs font-semibold text-primary bg-transparent border-none cursor-pointer"
                  (click)="markAllRead()">Mark all read</button>
        </div>
        <div class="overflow-y-auto flex-1">
          @for (n of notifService.notifications(); track n.id) {
            <div class="flex items-start gap-3 px-[18px] py-3.5 border-b border-surface"
                 [class]="n.isRead ? 'bg-white' : 'bg-[#FFFCF8]'">
              <div class="w-[38px] h-[38px] rounded-full flex items-center justify-center shrink-0 mt-0.5"
                   [class]="notifIconBg(n.type)">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                     [attr.stroke]="notifIconColor(n.type)"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
                  <polyline points="14 2 14 8 20 8"/>
                  <line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
                </svg>
              </div>
              <div class="flex-1 min-w-0">
                <div class="text-[13px] text-ink leading-snug mb-0.5"
                     [class]="n.isRead ? 'font-normal' : 'font-semibold'">{{ n.title }}</div>
                <div class="text-[11px] text-muted">{{ n.message }}</div>
              </div>
              @if (!n.isRead) {
                <div class="w-2 h-2 rounded-full bg-accent shrink-0 mt-1.5"></div>
              }
            </div>
          }
          @if (notifService.notifications().length === 0) {
            <div class="text-center py-12 text-sm text-muted">No notifications</div>
          }
        </div>
      </div>
    </div>
  }
</div>
