<div class="flex-1 flex flex-col overflow-hidden animate-sc-fade">
  <!-- Header -->
  <div class="bg-primary px-[18px] pt-3.5 pb-4 shrink-0">
    <div class="text-[10px] font-semibold text-white/60 tracking-wider uppercase mb-0.5">SpeedClaim</div>
    <div class="text-[21px] font-bold text-white leading-tight">Profile</div>
  </div>

  <!-- Scrollable content -->
  <div class="flex-1 overflow-y-auto pb-3">
    <!-- Identity card -->
    <div class="mx-3.5 mt-3.5 mb-3.5 bg-white rounded-[16px] shadow-lg p-5">
      <div class="flex items-center gap-3.5 mb-[18px]">
        <div class="w-[60px] h-[60px] rounded-full bg-primary text-white flex items-center justify-center text-xl font-bold shrink-0">
          {{ initials() }}
        </div>
        <div>
          <div class="text-[17px] font-bold text-ink leading-tight">{{ fullName() }}</div>
          <div class="text-xs text-muted mt-[3px]">Surveyor · IRDAI Lic. {{ licenseNo() }}</div>
          <div class="flex items-center gap-[5px] mt-1.5">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#1F9D6B" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
            <span class="text-[11px] text-success font-semibold">Active</span>
          </div>
        </div>
      </div>
      <div class="grid grid-cols-3 gap-0 border-t border-line pt-4">
        <div class="text-center pr-3 border-r border-line">
          <div class="text-[22px] font-bold text-primary sc-numeric">{{ totalClaims() }}</div>
          <div class="text-[10px] text-muted mt-0.5">Assigned</div>
        </div>
        <div class="text-center px-3 border-r border-line">
          <div class="text-[22px] font-bold text-success sc-numeric">{{ submittedCount() }}</div>
          <div class="text-[10px] text-muted mt-0.5">Submitted</div>
        </div>
        <div class="text-center pl-3">
          <div class="text-[22px] font-bold text-danger sc-numeric">{{ overdueCount() }}</div>
          <div class="text-[10px] text-muted mt-0.5">Overdue</div>
        </div>
      </div>
    </div>

    <!-- Contact info -->
    <div class="mx-3.5 mb-3.5 bg-white rounded-[14px] border border-line overflow-hidden">
      <div class="px-[15px] py-[13px] flex items-center gap-[11px] border-b border-line">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#6B7685" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 014.11 12 19.79 19.79 0 011 3.18 2 2 0 013 1h3a2 2 0 012 1.72c.127.96.36 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 16.92z"/>
        </svg>
        <span class="text-[13px] text-ink whitespace-nowrap">{{ phone() }}</span>
      </div>
      <div class="px-[15px] py-[13px] flex items-center gap-[11px] border-b border-line">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#6B7685" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>
        </svg>
        <span class="text-[13px] text-ink">{{ email() }}</span>
      </div>
      <div class="px-[15px] py-[13px] flex items-center gap-[11px]">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#6B7685" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/>
        </svg>
        <span class="text-[13px] text-ink">{{ zone() }}</span>
      </div>
    </div>

    <!-- Sign out -->
    <div class="mx-3.5">
      <button class="w-full h-[46px] border-[1.5px] border-line bg-white rounded-[12px] text-sm font-semibold text-danger cursor-pointer flex items-center justify-center gap-2 hover:bg-danger-bg transition-colors"
              (click)="signOut()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Sign out
      </button>
    </div>
  </div>
</div>
