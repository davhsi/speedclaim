<a href="#main-content" class="skip-link">Skip to main content</a>
<div class="min-h-screen flex bg-surface">
  <app-sidebar [collapsed]="sidebarCollapsed()" (sidebarToggle)="toggleSidebar()" />
  <div class="flex-1 flex flex-col min-h-screen transition-[margin] duration-200 lg:ml-60">
    <app-topbar (menuToggle)="toggleSidebar()" />
    <main id="main-content" class="flex-1 p-4 md:p-6 pb-20 lg:pb-6">
      <router-outlet />
    </main>
    <!-- Mobile Bottom Nav -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-line flex h-[60px] z-20 lg:hidden">
      @for (item of bottomNav; track item.route) {
        <a
          [routerLink]="item.route"
          routerLinkActive="text-primary font-semibold"
          [routerLinkActiveOptions]="{ exact: item.route === '/dashboard' }"
          class="flex-1 flex flex-col items-center justify-center gap-[3px] text-muted text-[10px]"
        >
          <span class="w-[22px] h-[22px] flex items-center justify-center" [innerHTML]="item.icon | safeHtml"></span>
          <span>{{ item.label }}</span>
        </a>
      }
    </nav>
  </div>
</div>
