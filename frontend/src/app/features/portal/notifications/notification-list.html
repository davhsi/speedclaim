<div class="animate-sc-fade max-w-[680px]">
  <div class="flex justify-between items-center mb-[18px]">
    <div class="text-xl font-semibold text-ink">Notifications</div>
    @if (notifications().some(n => !n.isRead)) {
      <button class="bg-transparent border-none text-primary text-[13px] font-semibold cursor-pointer disabled:opacity-50 disabled:cursor-wait flex items-center gap-1.5" [disabled]="markingAllRead()" (click)="markAllRead()">
        @if (markingAllRead()) {
          <span class="w-3 h-3 border-[1.5px] border-primary border-t-transparent rounded-full animate-spin"></span>
        }
        {{ markingAllRead() ? 'Marking…' : 'Mark all as read' }}
      </button>
    }
  </div>

  @if (loading()) {
    <div class="bg-white border border-line rounded-card shadow-sm overflow-hidden">
      @for (i of [1,2,3,4]; track i) {
        <div class="flex gap-[13px] px-[18px] py-4 border-b border-line animate-pulse">
          <div class="w-9 h-9 rounded-full bg-surface-alt shrink-0"></div>
          <div class="flex-1"><div class="h-4 bg-surface-alt rounded w-1/3 mb-2"></div><div class="h-3 bg-surface-alt rounded w-2/3"></div></div>
        </div>
      }
    </div>
  } @else if (notifications().length === 0) {
    <app-empty-state title="You're all caught up!" message="No notifications at the moment." />
  } @else {
    <div class="bg-white border border-line rounded-card shadow-sm overflow-hidden">
      @for (n of pagedNotifications(); track n.id) {
        <button type="button" class="w-full text-left bg-transparent border-0 flex gap-[13px] px-[18px] py-4 border-b border-line cursor-pointer hover:bg-surface transition-colors disabled:cursor-wait"
             [class.bg-primary-light/20]="!n.isRead"
             [disabled]="isMarkingRead(n.id)"
             (click)="markRead(n)">
          <div class="w-9 h-9 rounded-full bg-primary-light flex items-center justify-center shrink-0">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--color-primary)" stroke-width="1.75"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
          </div>
          <div class="flex-1 min-w-0">
            <div class="text-sm font-semibold text-ink mb-0.5">{{ n.title }}</div>
            <div class="text-[13px] text-body leading-relaxed">{{ n.message }}</div>
            <div class="text-[11px] text-muted mt-1.5">{{ n.createdAt | dateFormat:'long' }}</div>
          </div>
          @if (isMarkingRead(n.id)) {
            <span class="w-3 h-3 border-[1.5px] border-primary border-t-transparent rounded-full animate-spin shrink-0 mt-1.5"></span>
          } @else if (!n.isRead) {
            <span class="w-2 h-2 rounded-full bg-primary shrink-0 mt-1.5"></span>
          }
        </button>
      }
    </div>
    <div class="px-4 border-t border-line">
      <app-pagination [currentPage]="currentPage()" [totalPages]="totalPages()" (pageChange)="onPageChange($event)" />
    </div>
  }
</div>
