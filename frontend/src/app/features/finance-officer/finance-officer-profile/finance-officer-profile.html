<div class="animate-sc-fade max-w-[680px]">
  <div class="mb-6">
    <h1 class="text-xl font-semibold text-ink">My profile</h1>
    <p class="text-sm text-muted mt-0.5">Manage your account details and preferences.</p>
  </div>

  <div class="bg-white border border-line rounded-card shadow-sm p-6 mb-4">
    <!-- Avatar + name -->
    <div class="flex items-center gap-4 mb-6 pb-6 border-b border-line">
      <div class="w-14 h-14 rounded-card bg-primary text-white flex items-center justify-center text-[22px] font-bold shrink-0">
        {{ userInitials() }}
      </div>
      <div>
        <div class="text-lg font-semibold text-ink">{{ profileName }}</div>
        <div class="text-[13px] text-muted mt-[3px]">Finance Officer</div>
      </div>
    </div>

    <!-- Fields -->
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-3.5 mb-5">
      <div>
        <label for="fo-profile-full-name" class="block text-[13px] font-medium text-body mb-1.5">Full name</label>
        <input id="fo-profile-full-name" [(ngModel)]="profileName" class="w-full h-[42px] px-3 border border-line rounded-lg text-sm text-ink outline-none" />
      </div>
      <div>
        <label for="fo-profile-email" class="block text-[13px] font-medium text-body mb-1.5">Email</label>
        <input id="fo-profile-email" [(ngModel)]="profileEmail" class="w-full h-[42px] px-3 border border-line rounded-lg text-sm text-ink outline-none" />
      </div>
      <div>
        <label for="fo-profile-phone" class="block text-[13px] font-medium text-body mb-1.5">Phone</label>
        <input id="fo-profile-phone" [(ngModel)]="profilePhone" class="w-full h-[42px] px-3 border border-line rounded-lg text-sm text-ink outline-none" />
      </div>
    </div>

    <!-- Actions -->
    <div class="flex justify-between gap-3 pt-5 border-t border-line flex-wrap">
      <button (click)="onLogout()" class="h-[42px] px-5 border border-danger-border bg-danger-bg rounded-lg text-sm font-semibold text-danger cursor-pointer flex items-center gap-2 hover:opacity-90 transition-opacity">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Sign out
      </button>
      <div class="flex gap-2.5">
        <button
          (click)="onResetPassword()"
          [disabled]="resettingPassword()"
          class="h-[42px] px-5 border border-line bg-white rounded-lg text-sm font-semibold text-body cursor-pointer hover:bg-surface transition-colors disabled:opacity-50 disabled:cursor-wait"
        >{{ resettingPassword() ? 'Sending...' : 'Reset password' }}</button>
        <button
          (click)="onSave()"
          [disabled]="saving()"
          class="h-[42px] px-[22px] border-none bg-primary rounded-lg text-sm font-semibold text-white cursor-pointer hover:bg-primary-dark transition-colors disabled:opacity-50 disabled:cursor-wait"
        >{{ saving() ? 'Saving...' : 'Save changes' }}</button>
      </div>
    </div>
  </div>
</div>
