@if (!collapsed()) {
  <button type="button" aria-label="Close menu" class="fixed inset-0 w-full h-full bg-black/40 z-40 lg:hidden border-0 p-0 cursor-default" (click)="sidebarToggle.emit()"></button>
}
<aside
  class="fixed top-0 left-0 h-full z-50 flex flex-col w-[244px] transition-transform duration-200 ease-out"
  [class]="collapsed() ? '-translate-x-full lg:translate-x-0' : 'translate-x-0'"
  style="background: var(--color-sidebar); border-right: 1px solid rgba(255,255,255,.07);"
>
  <!-- Logo -->
  <div class="flex items-center gap-[10px] px-4 py-[18px] shrink-0" style="border-bottom: 1px solid rgba(255,255,255,.08);">
    <img src="/brand/speedclaim-mark.svg" alt="" class="w-[32px] h-[32px] rounded-lg shrink-0" style="box-shadow:0 2px 10px rgba(245,166,35,.25);" />
    <div>
      <div class="text-[13px] font-bold text-white leading-tight" style="letter-spacing:-.01em;">SpeedClaim</div>
      <div class="text-[9px] mt-px" style="color: rgba(255,255,255,.32); letter-spacing: .1em; text-transform: uppercase;">Admin Portal</div>
    </div>
    <button class="ml-auto lg:hidden text-white/60 hover:text-white bg-transparent border-none cursor-pointer" (click)="sidebarToggle.emit()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
  </div>

  <!-- Nav -->
  <nav class="flex-1 overflow-y-auto py-2.5 px-2">
    <div class="text-[9px] font-semibold px-2 mb-1 mt-1.5" style="color: rgba(255,255,255,.25); letter-spacing:.1em; text-transform:uppercase;">Management</div>
    @for (item of navItems; track item.route) {
      <a
        [routerLink]="item.route"
        routerLinkActive="ad-active"
        [routerLinkActiveOptions]="{ exact: item.exact }"
        class="flex items-center gap-[9px] w-full px-2.5 py-[8px] rounded-[7px] text-[12.5px] mb-px transition-colors no-underline"
        style="color: rgba(255,255,255,.52);"
        (click)="onNavClick()"
      >
        <span class="w-[15px] h-[15px] shrink-0 flex items-center justify-center" [innerHTML]="item.icon | safeHtml"></span>
        <span class="flex-1">{{ item.label }}</span>
        @if (item.badgeCount && item.badgeCount > 0) {
          <span class="text-[10px] px-1.5 py-px rounded-full font-medium sc-numeric" style="background:#1D2A38; color:#C7D0D9; font-feature-settings:'tnum';">{{ item.badgeCount }}</span>
        }
      </a>
    }
  </nav>

  <!-- User Footer -->
  <div class="px-3.5 py-3 flex items-center gap-[9px]" style="border-top: 1px solid rgba(255,255,255,.08);">
    <div class="w-[30px] h-[30px] rounded-full flex items-center justify-center text-[11px] font-bold text-sidebar bg-gold shrink-0 overflow-hidden">
      @if (userAvatar()) {
        <img [src]="userAvatar()" alt="Profile" class="w-full h-full object-cover" />
      } @else {
        {{ userInitials() }}
      }
    </div>
    <div class="flex-1 min-w-0">
      <div class="text-[12px] font-semibold text-white truncate">{{ userName() }}</div>
      <div class="text-[10px]" style="color: rgba(255,255,255,.35);">Administrator</div>
    </div>
    <button (click)="logout()" title="Sign out" class="bg-transparent border-none cursor-pointer p-1 flex shrink-0" style="color: rgba(255,255,255,.4);">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </div>
</aside>
