<div class="animate-[sc-fade_.25s_ease-out]">
  <div class="mb-6">
    <h1 class="text-[22px] font-semibold text-ink tracking-tight">Good morning, {{ firstName() }}</h1>
    <p class="text-sm text-muted mt-1">{{ pendingProposals() }} proposals and {{ pendingKyc() }} KYC reviews are awaiting your attention.</p>
  </div>

  <!-- Stats -->
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-7">
    <div (click)="navigateTo('/underwriter/proposals')" class="cursor-pointer">
      <app-stat-card
        title="Proposals to review"
        [value]="pendingProposals().toString()"
        iconBgClass="bg-warning-bg text-warning"
        [icon]="iconProposal"
      />
    </div>
    <div (click)="navigateTo('/underwriter/kyc')" class="cursor-pointer">
      <app-stat-card
        title="KYC reviews pending"
        [value]="pendingKyc().toString()"
        iconBgClass="bg-warning-bg text-warning"
        [icon]="iconKyc"
      />
    </div>
    <div (click)="navigateTo('/underwriter/endorsements')" class="cursor-pointer">
      <app-stat-card
        title="Endorsements pending"
        [value]="pendingEndorsements().toString()"
        iconBgClass="bg-info-bg text-info"
        [icon]="iconEndorsement"
      />
    </div>
    <div (click)="navigateTo('/underwriter/policies')" class="cursor-pointer">
      <app-stat-card
        title="Total active policies"
        [value]="activePolicies().toString()"
        iconBgClass="bg-success-bg text-success"
        [icon]="iconPolicy"
      />
    </div>
  </div>

  <!-- Recent activity -->
  <div class="bg-white border border-line rounded-xl shadow-sm overflow-hidden">
    <div class="px-5 py-4 border-b border-line">
      <h2 class="text-[15px] font-semibold text-ink">Recent activity</h2>
    </div>
    @for (item of recentActivity(); track $index) {
      <div class="flex items-center gap-3.5 px-5 py-3.5 border-b border-line hover:bg-surface transition-colors">
        <div class="w-9 h-9 rounded-lg flex items-center justify-center shrink-0 text-[10px] font-bold" [class]="item.bgClass">
          {{ item.abbr }}
        </div>
        <div class="flex-1 min-w-0">
          <div class="text-[13px] font-medium text-ink">{{ item.title }}</div>
          <div class="text-xs text-muted mt-0.5">{{ item.subtitle }}</div>
        </div>
        <div class="text-xs text-muted whitespace-nowrap shrink-0">{{ item.time }}</div>
      </div>
    } @empty {
      <div class="px-5 py-12 text-center text-sm text-muted">No recent activity</div>
    }
  </div>
</div>
