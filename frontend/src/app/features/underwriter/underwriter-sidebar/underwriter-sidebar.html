@if (!collapsed()) {
  <div class="fixed inset-0 bg-black/40 z-40 lg:hidden" (click)="toggle.emit()"></div>
}
<aside
  class="fixed top-0 left-0 h-full z-50 flex flex-col w-[244px] transition-transform duration-200 ease-out"
  [class]="collapsed() ? '-translate-x-full lg:translate-x-0' : 'translate-x-0'"
  style="background: var(--color-sidebar); border-right: 1px solid rgba(255,255,255,.07);"
>
  <!-- Logo -->
  <div class="flex items-center gap-[10px] px-4 py-[18px] shrink-0" style="border-bottom: 1px solid rgba(255,255,255,.08);">
    <img src="/brand/speedclaim-mark.svg" alt="" class="w-[30px] h-[30px] rounded-lg shrink-0" />
    <div>
      <div class="text-sm font-bold text-white leading-tight">SpeedClaim</div>
      <div class="text-[10px] font-semibold mt-px" style="color: rgba(255,255,255,.45); letter-spacing: .06em;">UNDERWRITER</div>
    </div>
    <button class="ml-auto lg:hidden text-white/60 hover:text-white bg-transparent border-none cursor-pointer" (click)="toggle.emit()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
  </div>

  <!-- Nav -->
  <nav class="flex-1 overflow-y-auto py-2.5 px-2">
    @for (item of navItems; track item.route) {
      <a
        [routerLink]="item.route"
        routerLinkActive="uw-active"
        [routerLinkActiveOptions]="{ exact: item.exact }"
        class="flex items-center gap-[10px] w-full px-2.5 py-[9px] rounded-lg text-[13px] mb-0.5 transition-colors no-underline"
        style="color: rgba(255,255,255,.68);"
        (click)="onNavClick()"
      >
        <span class="w-[18px] h-[18px] shrink-0 flex items-center justify-center" [innerHTML]="item.icon | safeHtml"></span>
        <span>{{ item.label }}</span>
      </a>
    }
  </nav>

  <!-- User Footer -->
  <div class="px-3 py-3 flex items-center gap-2.5" style="border-top: 1px solid rgba(255,255,255,.08);">
    <div class="w-8 h-8 rounded-full bg-gold text-sidebar flex items-center justify-center text-xs font-bold shrink-0 overflow-hidden">
      @if (userAvatar()) {
        <img [src]="userAvatar()" alt="Profile" class="w-full h-full object-cover" />
      } @else {
        {{ userInitials() }}
      }
    </div>
    <div class="flex-1 min-w-0">
      <div class="text-[13px] font-semibold text-white truncate">{{ userName() }}</div>
      <div class="text-[11px]" style="color: rgba(255,255,255,.5);">Underwriter</div>
    </div>
    <button (click)="logout()" title="Sign out" class="bg-transparent border-none cursor-pointer p-1 flex shrink-0" style="color: rgba(255,255,255,.4);">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </div>
</aside>
