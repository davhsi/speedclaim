<div class="min-h-screen flex bg-surface">
  <app-agent-sidebar [collapsed]="sidebarCollapsed()" (toggle)="toggleSidebar()" />
  <div class="flex-1 flex flex-col min-h-screen transition-[margin] duration-200 lg:ml-60">
    <!-- Topbar -->
    <header class="h-14 shrink-0 bg-white border-b border-line flex items-center gap-3 px-5 sticky top-0 z-20">
      <button class="lg:hidden bg-transparent border-none cursor-pointer text-body p-1 flex" (click)="toggleSidebar()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="flex-1 text-[15px] font-semibold text-ink">{{ pageTitle() }}</div>
      <button class="relative bg-transparent border-none cursor-pointer text-body p-2 flex">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
      </button>
      <div class="w-[30px] h-[30px] rounded-full bg-primary text-white flex items-center justify-center text-[11px] font-bold cursor-pointer">
        {{ userInitials() }}
      </div>
    </header>

    <!-- Content -->
    <main class="flex-1 overflow-y-auto p-6">
      <div class="max-w-[1280px] mx-auto">
        <router-outlet />
      </div>
    </main>
  </div>
</div>
