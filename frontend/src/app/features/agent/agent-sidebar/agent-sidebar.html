@if (!collapsed()) {
  <div class="fixed inset-0 bg-black/40 z-40 lg:hidden" (click)="toggle.emit()"></div>
}
<aside
  class="fixed top-0 left-0 h-full z-50 flex flex-col w-60 transition-transform duration-200 ease-out"
  [class]="collapsed() ? '-translate-x-full lg:translate-x-0' : 'translate-x-0'"
  [style.background]="'#12202F'"
  style="border-right: 1px solid #0A3040;"
>
  <!-- Logo -->
  <div class="flex items-center gap-[9px] px-4 py-[18px] shrink-0" style="border-bottom: 1px solid rgba(255,255,255,.1);">
    <div class="w-[30px] h-[30px] rounded-lg bg-primary flex items-center justify-center shrink-0">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    </div>
    <span class="text-[15px] font-bold text-white">SpeedClaim</span>
    <button class="ml-auto lg:hidden text-white/60 hover:text-white" (click)="toggle.emit()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 6L6 18M6 6l12 12"/>
      </svg>
    </button>
  </div>

  <!-- Nav -->
  <nav class="flex-1 overflow-y-auto py-3 px-2.5">
    @for (item of navItems; track item.route) {
      <a
        [routerLink]="item.route"
        routerLinkActive="agent-active"
        [routerLinkActiveOptions]="{ exact: item.exact }"
        class="flex items-center gap-[11px] w-full px-2.5 py-[10px] rounded-lg text-[13px] mb-0.5 transition-colors"
        style="color: rgba(255,255,255,.7);"
        (click)="onNavClick()"
      >
        <span class="w-[18px] h-[18px] shrink-0 flex items-center justify-center" [innerHTML]="item.icon"></span>
        <span>{{ item.label }}</span>
      </a>
    }
  </nav>

  <!-- User Footer -->
  <div class="px-3 py-3 flex items-center gap-2.5" style="border-top: 1px solid rgba(255,255,255,.1);">
    <a routerLink="/agent/profile" class="w-8 h-8 rounded-full bg-primary text-white flex items-center justify-center text-xs font-bold shrink-0 cursor-pointer">
      {{ userInitials() }}
    </a>
    <a routerLink="/agent/profile" class="flex-1 min-w-0 cursor-pointer">
      <div class="text-[13px] font-semibold text-white truncate">{{ userName() }}</div>
      <div class="text-[11px]" style="color: rgba(255,255,255,.6);">Agent</div>
    </a>
    <button (click)="logout()" title="Sign out" class="bg-transparent border-none cursor-pointer p-1.5 flex" style="color: rgba(255,255,255,.7);">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
    </button>
  </div>
</aside>
