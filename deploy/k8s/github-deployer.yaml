apiVersion: v1
kind: ServiceAccount
metadata:
  name: speedclaim-github-deployer
  namespace: speedclaim
---
# Contributor-only deployment workaround. Replace with GitHub OIDC when an Azure
# administrator can create federated identity and RBAC assignments.
apiVersion: v1
kind: Secret
metadata:
  name: speedclaim-github-deployer-token
  namespace: speedclaim
  annotations:
    kubernetes.io/service-account.name: speedclaim-github-deployer
type: kubernetes.io/service-account-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: speedclaim-github-deployer
  namespace: speedclaim
rules:
  - apiGroups: [""]
    resources: ["secrets", "serviceaccounts", "services"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: speedclaim-github-deployer
  namespace: speedclaim
subjects:
  - kind: ServiceAccount
    name: speedclaim-github-deployer
    namespace: speedclaim
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: speedclaim-github-deployer
