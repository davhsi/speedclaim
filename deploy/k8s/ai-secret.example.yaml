# Copy this outside Git, replace every value, then apply it once:
# kubectl apply -f /safe/path/speedclaim-ai-secrets.yaml
apiVersion: v1
kind: Secret
metadata:
  name: speedclaim-ai-secrets
  namespace: speedclaim
type: Opaque
stringData:
  AI__InternalApiKey: replace-with-a-long-random-internal-key
  AI__VectorConnectionString: postgresql://speedclaim_ai:password@server.postgres.database.azure.com:5432/speedclaim_ai?sslmode=require
  AI__AzureBlobConnectionString: replace-with-storage-connection-string
  ANTHROPIC_BASE_URL: https://your-approved-anthropic-gateway.example/v1
  ANTHROPIC_AUTH_TOKEN: replace-with-anthropic-gateway-token
