apiVersion: batch/v1
kind: Job
metadata:
  name: speedclaim-db-migrate
  namespace: speedclaim
  labels:
    app.kubernetes.io/name: speedclaim-db-migrate
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 600
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: speedclaim-db-migrate
        azure.workload.identity/use: "true"
    spec:
      restartPolicy: Never
      serviceAccountName: speedclaim-api
      imagePullSecrets:
        - name: acr-pull
      containers:
        - name: migrate
          image: __ACR_LOGIN_SERVER__/speedclaim-api:__API_IMAGE_TAG__
          imagePullPolicy: Always
          args: ["--migrate"]
          env:
            - name: KeyVault__Uri
              value: "__KEY_VAULT_URI__"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
