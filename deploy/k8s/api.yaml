apiVersion: v1
kind: ServiceAccount
metadata:
  name: speedclaim-api
  namespace: speedclaim
  annotations:
    azure.workload.identity/client-id: "__API_WORKLOAD_IDENTITY_CLIENT_ID__"
automountServiceAccountToken: false
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: speedclaim-api
  namespace: speedclaim
  labels:
    app.kubernetes.io/name: speedclaim-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: speedclaim-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: speedclaim-api
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: speedclaim-api
      automountServiceAccountToken: false
      imagePullSecrets:
        - name: acr-pull
      containers:
        - name: api
          image: __ACR_LOGIN_SERVER__/speedclaim-api:__API_IMAGE_TAG__
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: KeyVault__Uri
              value: "__KEY_VAULT_URI__"
            - name: AllowedOrigins__0
              value: "__FRONTEND_ORIGIN__"
            - name: Storage__Provider
              value: AzureBlob
            - name: Logging__BlobStorage__Enabled
              value: "true"
            - name: Logging__BlobStorage__ContainerName
              value: speedclaim-logs
            - name: AI__BaseUrl
              value: http://speedclaim-ai.speedclaim.svc.cluster.local:8000
            - name: EmailDelivery__Provider
              value: ServiceBus
            - name: EmailDelivery__QueueName
              value: email-dispatch
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: speedclaim-api
  namespace: speedclaim
spec:
  selector:
    app.kubernetes.io/name: speedclaim-api
  ports:
    - name: http
      port: 80
      targetPort: http
