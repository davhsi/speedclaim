name: Validate infrastructure

on:
  pull_request:
    paths:
      - infra/**
      - deploy/**
      - .github/workflows/validate-infrastructure.yml
  push:
    branches: [main]
    paths:
      - infra/**
      - deploy/**
      - .github/workflows/validate-infrastructure.yml

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Build Bicep
        uses: azure/cli@v2
        with:
          inlineScript: az bicep build --file infra/main.bicep
      - name: Validate Kubernetes manifests with placeholders
        run: |
          docker run --rm -v "$PWD:/work" -w /work ghcr.io/yannh/kubeconform:latest -summary -ignore-missing-schemas deploy/k8s/*.yaml
