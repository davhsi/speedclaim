name: Deploy notification Function

on:
  push:
    branches: [main]
    paths:
      - functions/**
      - .github/workflows/deploy-notification-function.yml
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE_SPEEDCLAIM_PROD != '' && secrets.AZURE_FUNCTIONAPP_NAME_SPEEDCLAIM_PROD != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: 10.0.x
      - name: Publish Function
        run: dotnet publish functions/SpeedClaim.Notifications.Functions/SpeedClaim.Notifications.Functions.csproj --configuration Release --output ./function-publish
      - uses: Azure/functions-action@bc63708cc6539760eea18d8a7de4ce8ef5fdf593 # v1
        with:
          app-name: ${{ secrets.AZURE_FUNCTIONAPP_NAME_SPEEDCLAIM_PROD }}
          package: ./function-publish
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE_SPEEDCLAIM_PROD }}
