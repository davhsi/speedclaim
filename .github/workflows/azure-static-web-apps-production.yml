name: Deploy production Static Web App

on:
  push:
    branches: [main]
    paths:
      - frontend/**
      - .github/workflows/azure-static-web-apps-production.yml
  workflow_dispatch:

jobs:
  deploy:
    # This lets the workflow exist safely before the new Static Web App token is created.
    if: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_SPEEDCLAIM_PROD != '' && secrets.API_PUBLIC_ORIGIN != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          submodules: true
          lfs: false
      - name: Configure production API origin
        env:
          API_PUBLIC_ORIGIN: ${{ secrets.API_PUBLIC_ORIGIN }}
        run: sed -i "s|backendOrigin: '.*'|backendOrigin: '${API_PUBLIC_ORIGIN}'|" frontend/src/environments/environment.production.ts
      - name: Build and deploy
        uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9 # v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_SPEEDCLAIM_PROD }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: ./frontend
          api_location: ''
          output_location: dist/frontend/browser
          app_build_command: npm run build -- --configuration production && cp dist/frontend/browser/index.csr.html dist/frontend/browser/index.html
