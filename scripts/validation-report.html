function init() {
  renderSummary();
  populateCategoryFilter();
  render();
  document.getElementById('search').addEventListener('input', render);
  document.getElementById('categoryFilter').addEventListener('change', render);
  document.getElementById('statusFilter').addEventListener('change', render);
  document.getElementById('httpFilter').addEventListener('change', render);
  document.querySelectorAll('thead th[data-sort]').forEach(th => {
    th.addEventListener('click', () => {
      const key = th.dataset.sort;
      if (sortKey === key) sortAsc = !sortAsc;
      else { sortKey = key; sortAsc = true; }
      render();
    });
  });
}

function renderSummary() {
  const s = data.summary;
  document.getElementById('summary').innerHTML = `
    <div class="stat total"><div class="value">${s.total}</div><div class="label">Total Scenarios</div></div>
    <div class="stat pass"><div class="value">${s.passed}</div><div class="label">Passed</div></div>
    <div class="stat fail"><div class="value">${s.failed}</div><div class="label">Failed</div></div>
    <div class="stat rate"><div class="value">${s.passRate}</div><div class="label">Pass Rate</div></div>
  `;
}

function populateCategoryFilter() {
  const cats = [...new Set(data.scenarios.map(s => s.category))].sort();
  const sel = document.getElementById('categoryFilter');
  cats.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; sel.appendChild(o); });
}

function getFiltered() {
  const q = document.getElementById('search').value.toLowerCase();
  const cat = document.getElementById('categoryFilter').value;
  const status = document.getElementById('statusFilter').value;
  const http = document.getElementById('httpFilter').value;

  return data.scenarios.filter(s => {
    if (cat && s.category !== cat) return false;
    if (status === 'pass' && !s.passed) return false;
    if (status === 'fail' && s.passed) return false;
    if (http && String(s.expectedStatus) !== http) return false;
    if (q) {
      const blob = `${s.scenario} ${s.category} ${s.method} ${s.expectedStatus} ${s.actualStatus} ${JSON.stringify(s.response)}`.toLowerCase();
      if (!blob.includes(q)) return false;
    }
    return true;
  });
}

function render() {
  let rows = getFiltered();
  rows.sort((a, b) => {
    let va = a[sortKey], vb = b[sortKey];
    if (typeof va === 'string') va = va.toLowerCase();
    if (typeof vb === 'string') vb = vb.toLowerCase();
    if (typeof va === 'boolean') { va = va ? 1 : 0; vb = vb ? 1 : 0; }
    if (va < vb) return sortAsc ? -1 : 1;
    if (va > vb) return sortAsc ? 1 : -1;
    return 0;
  });

  document.getElementById('filterCount').textContent = `Showing ${rows.length} of ${data.scenarios.length}`;

  document.querySelectorAll('thead th[data-sort]').forEach(th => {
    const arrow = th.querySelector('.arrow');
    arrow.textContent = th.dataset.sort === sortKey ? (sortAsc ? '▲' : '▼') : '';
  });

  const tbody = document.getElementById('tbody');
  if (rows.length === 0) {
    tbody.innerHTML = '<tr><td colspan="8" class="no-results">No matching scenarios found.</td></tr>';
    return;
  }

  tbody.innerHTML = rows.map(s => {
    const statusClass = s.actualStatus < 300 ? 'status-2xx' : s.actualStatus < 500 ? 'status-4xx' : 'status-5xx';
    const resp = JSON.stringify(s.response, null, 2);
    const uid = `resp-${s.id}`;
    return `<tr>
      <td>${s.id}</td>
      <td><span class="badge ${s.passed ? 'badge-pass' : 'badge-fail'}">${s.passed ? 'PASS' : 'FAIL'}</span></td>
      <td><span class="method method-${s.method}">${s.method}</span></td>
      <td>${esc(s.scenario)}</td>
      <td><span class="category-tag">${esc(s.category)}</span></td>
      <td class="status-code ${statusClass}">${s.expectedStatus}</td>
      <td class="status-code ${statusClass}">${s.actualStatus}</td>
      <td>
        <span class="response-toggle" onclick="toggle('${uid}')">view</span>
        <div class="response-body" id="${uid}">${esc(resp)}</div>
      </td>
    </tr>`;
  }).join('');
}

function toggle(id) {
  document.getElementById(id).classList.toggle('open');
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
</script>
</body>
</html>
